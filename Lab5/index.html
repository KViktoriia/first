<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Квадрат Числа</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #333; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="card">
    <h3>Обчислити квадрат</h3>
    <input type="number" id="numberInput" placeholder="Введіть число">
    <br>
    <button onclick="sendData()">Обчислити</button>
    <div id="result"></div>
</div>

<script>
    function sendData() {
        const num = document.getElementById('numberInput').value;
        const resultDiv = document.getElementById('result');

        if (num === "") {
            resultDiv.innerText = "Будь ласка, введіть число.";
            return;
        }

        // Використання технології AJAX через сучасний Fetch API
        fetch('server.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'number=' + encodeURIComponent(num)
        })
        .then(response => response.text()) // Очікуємо текстову відповідь від сервера
        .then(data => {
            // Вивід текстової інформації на фронт-стороні
            resultDiv.innerText = data;
        })
        .catch(error => {
            console.error('Помилка:', error);
            resultDiv.innerText = "Помилка з'єднання з сервером.";
        });
    }
</script>

</body>
</html>
