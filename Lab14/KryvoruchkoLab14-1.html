<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .block {
            border: 1px solid gray;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            margin-bottom: 0; 
            padding: 10px;
            
            background-color: #fff;
            color: #28a745; 
        }

        .row {
            --bs-gutter-x: 0;
        }

        @media (min-width: 768px) and (max-width: 991px) {
            .block { color: black; } 
            
            .menu-left, .menu-right {
                background-color: #e0b0ff; 
            }
        }

        @media (min-width: 992px) and (max-width: 1199px) {
            .block { color: black; }

            .header-right, .footer-left {
                background-color: #ffb6c1; 
            }
            .content {
                background-color: #ffc0cb; 
            }
        }

        @media (min-width: 1200px) {
            .block { color: black; }

            .header-left, .footer-right {
                background-color: #f5deb3;
            }

            .header-right {
                color: red;
            }
            .footer-left {
                color: blue;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4">

    <div class="row">
        <div class="col-12 col-md-6 col-lg-4 col-xl-8 block header-left">
            Ліва частина шапки
        </div>
        
        <div class="col-12 col-md-6 col-lg-8 col-xl-4 block header-right">
            Права частина шапки
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-md-12 col-lg-3 block menu-left">
            Ліве меню
        </div>

        <div class="col-12 col-md-12 col-lg-6 block content">
            Контент
        </div>

        <div class="col-12 col-md-12 col-lg-3 block menu-right">
            Праве меню
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-md-6 col-lg-9 col-xl-3 block footer-left">
            Ліва частина підвалу
        </div>

        <div class="col-12 col-md-6 col-lg-3 col-xl-9 block footer-right">
            Права частина підвалу
        </div>
    </div>
</div>

</body>
</html>
