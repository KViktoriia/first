<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 2 - Bootstrap Grid Full Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        .demo-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .demo-block {
            height: 33.33vh;
        }

        @media (min-width: 768px) {
            .demo-block {
                height: 50vh;
            }
        }

        @media (min-width: 1200px) {
            .demo-block {
                height: 100vh;
            }
        }
        
        .block-1 { background-color: #4472c4; }
        .block-2 { background-color: #ffc000; }
        .block-3 { background-color: #c00000; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    
    <div class="row g-0">
        <div class="col-12 col-md-12 col-lg-8 col-xl-6 demo-block block-1">
            #1
        </div>

        <div class="col-12 col-md-6 col-lg-4 col-xl-3 demo-block block-2">
            #2
        </div>

        <div class="col-12 col-md-6 col-lg-12 col-xl-3 demo-block block-3">
            #3
        </div>
    </div>
</div>

</body>
</html>
